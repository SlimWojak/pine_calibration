  driving_verdicts: [V001, V004, V009, V011, V015]
  tuning_principles: [V003 "major moves > micro moves", V010 "trust calibrated rules on marginal cases"]

# --- LOCKED values ---
locked:
  primitive: swing_points
  applies_to: [1D]
  N: 2                  # fractal pivot N — bar i is pivot iff high/low is extreme of bars [i-N..i+N]
  height_display_pips: 15.0  # DISPLAY threshold only — NOT a detection gate.
                             # Swings with height < 15p are emitted as weak (dim) markers;
                             # ≥ 15p are emitted as strong (bold) markers. MSS chain uses ALL
                             # detected swings regardless of display threshold.

# --- canonical algorithm shape (canon-mirror, post-2026-05-17 audit) ---
canonical_algorithm:
  detection: "Emit ALL N-pivots — both SWH and SWL"
  height_computation: "height_pips = distance to nearest prior opposite swing (NOT immediate-neighbor pips)"
  canon_audit_fix_date: 2026-05-17
  canon_audit_evidence: "~en1gma/console/detection/swing_points.py + ~pine_calibration/pine/htf_map_v1.pine lines 77-154"
  why_critical: |
    Pre-audit (2026-05-17 morning), Pine filtered pivots inline by immediate-neighbor
    pips, killing cluster-top SHs (e.g. Feb 10 2026 SH was only 1.4p above Feb 09/11
    neighbors, structurally real but algorithmically invisible). Canonical emits all,
    computes height as leg amplitude. Olya signed off on canon-mirror algorithm same day.

